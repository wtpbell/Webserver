name: C/C++ CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: build and test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: make test
      run:
        make fclean test
    - name: http request/response
      run: |
        make fclean all
        bash ./tests/bash/run_all.sh

http {
    index index.html;
    client_max_body_size 1m;
    autoindex off;

    server {
        listen 8080;
        server_name localhost;

        root ./www;
        index index.html;

        allowed_methods GET POST DELETE;

        error_page 404 /404.html;
        error_page 500 /500.html;

        # default location
        location / {
            root ./www;
            index index.html;
            autoindex on;
        }

        # upload / POST testing
        location /upload {
            root ./www;
            allowed_methods POST;
        }

        # delete testing
        location /delete {
            root ./www;
            allowed_methods DELETE;
        }

        # CGI (for later)
        location /cgi-bin {
            root ./www/cgi-bin;
            cgi on;

            cgi_extension .py /usr/bin/python3;
            cgi_extension .sh /bin/bash;

            allowed_methods GET POST;
        }
    }
}

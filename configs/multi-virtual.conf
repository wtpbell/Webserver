http {
    index index.html;
    client_max_body_size 1m;
    autoindex off;

    server {
        listen 8080;
        server_name localhost;

        root ./www/site0;
        index index.html;
        allowed_methods GET POST DELETE;

        error_page 404 /404.html;
        error_page 500 /500.html;

        location / {
            root ./www/site0;
            index index.html;
            autoindex on;
        }

        location /upload {
            root ./www/site0/uploads;
            allowed_methods POST;
        }

        location /delete {
            root ./www/site0;
            allowed_methods DELETE;
        }

        location /cgi-bin {
            root ./www/site0/cgi-bin;
            cgi on;
            cgi_extension .py /usr/bin/python3;
            cgi_extension .sh /bin/bash;
            allowed_methods GET POST;
        }
    }

    server {
        listen 8080 default_server;
        server_name server1;

        root ./www/site1;
        index index.html;
        allowed_methods GET POST DELETE;

        error_page 404 /404.html;
        error_page 500 /500.html;

        location / {
            root ./www/site1;
            index index.html;
            autoindex on;
        }

        location /api {
            root ./www/site1/api;
            allowed_methods GET POST;
        }

        location /files {
            root ./www/site1/files;
            allowed_methods GET DELETE;
            autoindex on;
        }
    }

    server {
        listen 8080;
        listen 8081;
        listen 8082;
        server_name server2 serv2;

        root ./www/site2;
        index index.html;
        allowed_methods GET POST DELETE;

        location / {
            root ./www/site2;
            index index.html;
        }

        location /static {
            root ./www/site2/static;
            allowed_methods GET;
            autoindex on;
        }

        location /redir {
            return 301 /static;
        }
    }
}
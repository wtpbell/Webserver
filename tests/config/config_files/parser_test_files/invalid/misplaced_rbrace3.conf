
# HTTP block
http {
    # Set maximum allowed size for client request bodies (e.g., 10MB)
    client_max_body_size 10M;

    # Define custom error pages (can be overridden per server)
    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/50x.html;

    # First website - Main site
    server {
        listen 80;
        listen 443 ssl;
        server_name example.com www.example.com;

        # Root directory for this server
        root /var/www/example;

        # Custom error pages for this server
        error_page 404 /errors/404.html;
        error_page 500 502 503 504 /errors/50x.html;
        
        location /errors/404.html {
            #internal;
        }
        
        location /errors/50x.html {
            #internal;
        }

        # Route 1: Basic route with specific HTTP methods allowed
        location /api {
            #limit_except GET POST DELETE {
            #    deny all;
            #}
            root /var/www/example;
        }

        # Route 2: HTTP redirection
        location /old-page {
            #return 301 /new-page;
        }

        # Route 3: Custom root directory for specific route
        location /kapouet {
            root /tmp/www;
            # This will search for files in /tmp/www/kapouet/
            # URL /kapouet/pouic/toto/pouet -> /tmp/www/kapouet/pouic/toto/pouet
        }

        # Route 4: Directory listing enabled
        location /downloads {
            root /var/www/example;
            #autoindex on;
        }

        # Route 5: Directory listing disabled (default behavior)
        location /private {
            root /var/www/example;
            #autoindex off;
        }

        # Route 6: Default file when directory is requested
        location /docs {
            root /var/www/example;
            index index.html index.htm default.html;
        }

        # Route 7: File upload location
        location /upload {
            #limit_except POST PUT {
            #    deny all;
            #}
            
            # Enable uploads
            #client_body_temp_path /var/www/uploads/temp;
            
            # Store uploaded files
            root /var/www/uploads;
            
            # You would typically use a backend script to handle uploads
            # This is a simplified example
            # dav_methods PUT;
        }
    }

    # Second website - Blog
    server {
        listen 8080;
        listen 8443 ssl;
        server_name blog.example.com;

        root /var/www/blog;

        # Custom error pages
        error_page 404 /404.html;
        error_page 500 /500.html;

        # Default index files
        index index.html index.htm;

        # Allow only GET and POST methods globally
        #limit_except GET POST {
        #    deny all;
        #}

        location /admin {
            root /var/www/blog;
            #autoindex off;
        }
    }

    # Third website - Static files server
    server {
        listen 3000;
        server_name static.example.com;

        root /var/www/static;

        # Enable directory listing for entire site
        # autoindex on;

        # Larger upload size for this server
        client_max_body_size 50M;

        location / {
            #limit_except GET HEAD {
            #    deny all;
            #}
        }
    }

    # Fourth website - API server
    server {
        listen 5000;
        server_name api.example.com;

        # API-specific error pages
        error_page 404 /api/errors/not_found.json;
        error_page 500 /api/errors/server_error.json;

        location /api/v1 {
            root /var/www/api;
            #limit_except GET POST PUT DELETE PATCH {
            #    deny all;
            #}
        }

        # Redirect old API version
        location /api/v0 {
            #return 301 /api/v1;
        }
    }
}}

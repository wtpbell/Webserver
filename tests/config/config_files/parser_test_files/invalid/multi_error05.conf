;;;
# HTTP block
http {
    client_max_body_size 10000000000M;
    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/50x.html;

    # First website - Main site
    server {
        listen 80;
        listen 443 ssl;
        server_name example.com www.example.com;
        root /var/www/example;
        error_page 404 /errors/404.html;
        error_page 500 502 503 504 /errors/50x.html;
        
        location /errors/404.html {
            #internal;
        }
        
        location /errors/50x.html {
            #internal;
        }

        # Route 1: Basic route with specific HTTP methods allowed
        location /api {
            allowed_methods POST DELETE GET;
            root /path /var/www/example;;;;
        }

        # Route 2: HTTP redirection
        location /old-page {
            return 100 /new-page;
        }

        # Route 3: Custom root directory for specific route
        location /kapouet {
            root /tmp/www;
        }

        # Route 4: Directory listing enabled
        location /downloads {
            root /var/www/example;
            autoindex on;
        }

        # Route 5: Directory listing disabled (default behavior)
        location /private {
            root /var/www/example;
            autoindex off;
        }

        # Route 6: Default file when directory is requested
        location /docs {
            root /var/www/example;
            index index.html index.htm default.html;
        }

        # Route 7: File upload location
        location /upload {
            allowed_methods POST POST;
            #client_body_temp_path /var/www/uploads/temp /path;
            root /var/www/uploads;
        }
    }

    # Second website - Blog
    server /invalid_param {
        listen 8080;
        listen 8443 ssl;
        server_name blog.example.com;
        root /var/www/blog;
        error_page 404 /404.html;
        error_page 500 /500.html;
        index index.html index.htm;
        allowed_methods GEt POST;

        location /admin {
            root /var/www/blog;
            autoindex off;
        }
    }

    # Third website - Static files server
    server {
        listen 3000;
        server_name static.example.com;
        root /var/www/static;
        autoindex on;
        client_max_body_size 50M;

        location / {
            allowed_methods GET;
        }
    }{}

    # Fourth website - API server
    server {
        listen 5000;
        server_name api.example.commmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmm;

        error_page 404 /api/errors/not_found.json;
        error_page 500 /api/errors/server_error.json;

        location /api/v1 {
            root /var/www/api;
            allowed_methods GET POST DELETE;
        }

        # Redirect old API version
        location /api/v0 /path {
            return 999 /api/v1;
        
    }
}

